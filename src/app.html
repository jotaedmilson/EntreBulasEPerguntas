<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- Fonte da logo (Coiny, via Google Fonts), com o arquivo pré-carregado. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/coiny/v17/gyByhwU1K989PUwcGFU.woff2" />
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Coiny&display=swap" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
